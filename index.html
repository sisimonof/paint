<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paint Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,70,100,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(50,180,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(100,50,200,0.1) 0%, transparent 40%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
            color: white; overflow: hidden; user-select: none;
        }
        h1#title {
            font-family: 'Fredoka One', cursive; font-size: 28px; letter-spacing: 3px; margin-bottom: 4px;
            background: linear-gradient(90deg, #ff4664 0%, #ff8fa3 25%, #fff 50%, #7dd3ff 75%, #32b4ff 100%);
            background-size: 200% 100%; animation: title-shimmer 4s ease-in-out infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; filter: drop-shadow(0 2px 10px rgba(255,70,100,0.3));
        }
        @keyframes title-shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        #header { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
        .score { font-size:16px; font-weight:900; padding:4px 14px; border-radius:20px; min-width:120px; text-align:center; backdrop-filter:blur(8px); }
        #score1 { background:linear-gradient(135deg,rgba(255,70,100,0.35),rgba(255,70,100,0.1)); color:#ff6b88; border:2px solid rgba(255,70,100,0.35); }
        #score2 { background:linear-gradient(135deg,rgba(50,180,255,0.35),rgba(50,180,255,0.1)); color:#66ccff; border:2px solid rgba(50,180,255,0.35); }
        .effect-icons { display:inline-flex; gap:2px; margin-left:4px; font-size:14px; }
        #timer { font-family:'Fredoka One',cursive; font-size:28px; background:rgba(255,255,255,0.06); padding:2px 18px; border-radius:12px; border:2px solid rgba(255,255,255,0.1); min-width:70px; text-align:center; }
        #timer.warning { color:#ff5555; animation:pulse-timer 0.5s infinite alternate; }
        @keyframes pulse-timer { to{transform:scale(1.08)} }
        #bar-container { width:calc(100vw - 20px); height:10px; border-radius:5px; overflow:hidden; margin-bottom:3px; display:flex; background:rgba(255,255,255,0.06); }
        #bar1 { height:100%; background:linear-gradient(90deg,#ff4664,#ff8fa3); transition:width 0.3s; border-radius:4px 0 0 4px; }
        #barNeutral { height:100%; flex:1; }
        #bar2 { height:100%; background:linear-gradient(270deg,#32b4ff,#7dd3ff); transition:width 0.3s; border-radius:0 4px 4px 0; }
        #game-wrapper { position:relative; border-radius:10px; overflow:hidden; }
        #game-wrapper::before { content:''; position:absolute; inset:-2px; border-radius:12px; background:linear-gradient(135deg,rgba(255,70,100,0.3),rgba(100,50,200,0.2),rgba(50,180,255,0.3)); z-index:-1; filter:blur(1px); }
        canvas { display:block; border-radius:10px; }
        #controls { margin-top:4px; font-size:11px; opacity:0.3; text-align:center; letter-spacing:1px; }
        #bonus-notif { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8); font-family:'Fredoka One',cursive; font-size:30px; pointer-events:none; opacity:0; transition:opacity 0.25s,transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275); text-shadow:0 2px 20px rgba(0,0,0,0.9),0 0 40px currentColor; z-index:5; letter-spacing:2px; }
        #bonus-notif.show { opacity:1; transform:translate(-50%,-55%) scale(1); }

        /* End screen */
        #endScreen { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(5,5,15,0.9); backdrop-filter:blur(15px); flex-direction:column; align-items:center; justify-content:center; z-index:10; }
        #endScreen.visible { display:flex; animation:fadeIn 0.5s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        #endScreen h1 { font-family:'Fredoka One',cursive; font-size:56px; margin-bottom:12px; text-shadow:0 0 40px currentColor,0 0 80px currentColor; animation:winner-glow 2s ease-in-out infinite alternate; }
        @keyframes winner-glow { from{filter:brightness(1)} to{filter:brightness(1.3)} }
        #endScreen p { font-size:20px; margin-bottom:8px; opacity:0.7; }
        #endScreen .bar-final { width:400px; height:14px; border-radius:7px; overflow:hidden; display:flex; margin-bottom:15px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); }
        .bar-final .bf1 { height:100%; background:linear-gradient(90deg,#ff4664,#ff8fa3); transition:width 1.5s; }
        .bar-final .bf2 { height:100%; background:linear-gradient(270deg,#32b4ff,#7dd3ff); transition:width 1.5s; }
        .coins-earned { font-family:'Fredoka One',cursive; font-size:22px; color:#ffdd00; margin-bottom:20px; text-shadow:0 0 15px rgba(255,221,0,0.4); }
        #restartBtn { padding:14px 55px; font-size:20px; font-family:'Fredoka One',cursive; border:none; border-radius:30px; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; cursor:pointer; letter-spacing:2px; box-shadow:0 4px 25px rgba(102,126,234,0.4); transition:transform 0.2s,box-shadow 0.2s; }
        #restartBtn:hover { transform:scale(1.08); }
        #restartBtn:active { transform:scale(0.98); }

        /* Shared button styles */
        .menu-btn { padding:16px 60px; font-size:22px; font-family:'Fredoka One',cursive; border:none; border-radius:35px; color:#fff; cursor:pointer; letter-spacing:3px; transition:transform 0.2s,box-shadow 0.2s; margin-bottom:12px; width:280px; }
        .menu-btn:hover { transform:scale(1.08); }
        .menu-btn:active { transform:scale(0.98); }
        .small-btn { padding:12px 40px; font-size:16px; margin-top:5px; }

        /* Menu */
        .screen-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:#0a0a1a; background-image:radial-gradient(ellipse at 20% 50%,rgba(255,70,100,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(50,180,255,0.12) 0%,transparent 50%),radial-gradient(ellipse at 50% 100%,rgba(100,50,200,0.15) 0%,transparent 40%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
        .screen-overlay.hidden { display:none; }
        #menuScreen h1 { font-family:'Fredoka One',cursive; font-size:72px; letter-spacing:6px; background:linear-gradient(90deg,#ff4664 0%,#ff8fa3 25%,#fff 50%,#7dd3ff 75%,#32b4ff 100%); background-size:200% 100%; animation:title-shimmer 4s ease-in-out infinite; -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-transform:uppercase; margin-bottom:10px; filter:drop-shadow(0 4px 20px rgba(255,70,100,0.4)); }
        #menuScreen .subtitle { font-size:16px; opacity:0.5; margin-bottom:20px; letter-spacing:3px; }
        .coin-display { font-family:'Fredoka One',cursive; font-size:22px; color:#ffdd00; margin-bottom:20px; text-shadow:0 0 10px rgba(255,221,0,0.3); padding:6px 20px; background:rgba(255,221,0,0.08); border:1px solid rgba(255,221,0,0.15); border-radius:20px; }
        #playBtn { background:linear-gradient(135deg,#ff4664,#ff8fa3); box-shadow:0 4px 30px rgba(255,70,100,0.5); }
        #onlineBtn { background:linear-gradient(135deg,#32b4ff,#7dd3ff); box-shadow:0 4px 30px rgba(50,180,255,0.5); }
        #gachaBtn { background:linear-gradient(135deg,#ffaa00,#ffdd44); box-shadow:0 4px 30px rgba(255,170,0,0.5); color:#333; }
        #charsBtn { background:linear-gradient(135deg,#44ee66,#88ff99); box-shadow:0 4px 30px rgba(68,238,102,0.5); color:#333; }
        .menu-controls { margin-top:20px; opacity:0.4; font-size:14px; text-align:center; line-height:2; }

        /* Lobby */
        #lobbyScreen h2 { font-family:'Fredoka One',cursive; font-size:36px; margin-bottom:30px; color:#7dd3ff; }
        .lobby-section { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:30px 40px; margin-bottom:20px; text-align:center; min-width:340px; }
        .lobby-section h3 { font-family:'Fredoka One',cursive; font-size:20px; margin-bottom:15px; opacity:0.8; }
        .room-code { font-family:'Fredoka One',cursive; font-size:52px; letter-spacing:12px; color:#ffdd00; text-shadow:0 0 20px rgba(255,221,0,0.4); margin:10px 0; }
        .lobby-input { font-family:'Fredoka One',cursive; font-size:32px; letter-spacing:10px; text-align:center; width:200px; padding:10px; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15); border-radius:15px; color:white; outline:none; text-transform:uppercase; }
        .lobby-input:focus { border-color:rgba(50,180,255,0.5); }
        .lobby-input::placeholder { color:rgba(255,255,255,0.2); letter-spacing:6px; font-size:22px; }
        .lobby-btn { padding:12px 40px; font-size:18px; font-family:'Fredoka One',cursive; border:none; border-radius:25px; color:#fff; cursor:pointer; letter-spacing:2px; transition:transform 0.2s; margin-top:12px; }
        .lobby-btn:hover { transform:scale(1.05); }
        #createBtn { background:linear-gradient(135deg,#ff4664,#ff8fa3); box-shadow:0 4px 20px rgba(255,70,100,0.4); }
        #joinBtn { background:linear-gradient(135deg,#32b4ff,#7dd3ff); box-shadow:0 4px 20px rgba(50,180,255,0.4); }
        #lobbyBackBtn { background:linear-gradient(135deg,#667eea,#764ba2); margin-top:20px; }
        .lobby-status { font-size:16px; margin-top:12px; opacity:0.6; }
        .lobby-error { color:#ff5555; font-size:14px; margin-top:8px; }
        .waiting::after { content:'...'; animation:dots 1.5s steps(4) infinite; }
        @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

        /* Character Select */
        #charSelectScreen h2 { font-family:'Fredoka One',cursive; font-size:36px; margin-bottom:20px; }
        .char-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; max-width:550px; padding:0 10px; }
        .char-card { background:rgba(255,255,255,0.05); border:3px solid rgba(255,255,255,0.1); border-radius:16px; padding:12px 8px; text-align:center; cursor:pointer; transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s; position:relative; }
        .char-card:hover { transform:scale(1.05); }
        .char-card.selected { border-color:#ffdd00; box-shadow:0 0 20px rgba(255,221,0,0.3); }
        .char-card.locked { opacity:0.4; cursor:default; }
        .char-card.locked:hover { transform:none; }
        .char-card .char-icon { font-size:40px; margin-bottom:5px; }
        .char-card .char-name { font-family:'Fredoka One',cursive; font-size:14px; margin-bottom:4px; }
        .char-card .char-rarity { font-size:11px; font-weight:900; letter-spacing:1px; }
        .char-card .char-power { font-size:11px; opacity:0.5; margin-top:4px; }
        .char-card .lock-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:30px; }
        .rarity-common { color:#aaa; }
        .rarity-rare { color:#66ccff; }
        .rarity-epic { color:#cc44ff; }
        .rarity-legendary { color:#ffdd00; }

        /* Gacha */
        #gachaScreen h2 { font-family:'Fredoka One',cursive; font-size:36px; margin-bottom:15px; }
        .gacha-machine { background:rgba(255,255,255,0.04); border:2px solid rgba(255,255,255,0.1); border-radius:30px; padding:40px 50px; text-align:center; margin-bottom:20px; min-width:350px; }
        .gacha-cost { font-family:'Fredoka One',cursive; font-size:18px; color:#ffdd00; margin-bottom:15px; }
        .gacha-rates { font-size:12px; opacity:0.4; margin-bottom:20px; line-height:1.8; }
        #pullBtn { background:linear-gradient(135deg,#ffaa00,#ffdd44); box-shadow:0 4px 25px rgba(255,170,0,0.5); color:#333; padding:16px 60px; font-size:22px; }
        #pullBtn:disabled { opacity:0.3; cursor:default; transform:none !important; }
        .gacha-result { margin-top:20px; display:none; }
        .gacha-result.show { display:block; animation:fadeIn 0.5s ease; }
        .gacha-result .result-icon { font-size:60px; margin-bottom:10px; }
        .gacha-result .result-name { font-family:'Fredoka One',cursive; font-size:28px; margin-bottom:5px; }
        .gacha-result .result-desc { font-size:14px; opacity:0.6; }
        .gacha-result .result-dupe { color:#ff8800; font-size:14px; margin-top:8px; }

        /* Countdown */
        #countdown { position:fixed; top:0;left:0;right:0;bottom:0; display:none; align-items:center; justify-content:center; z-index:15; background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); }
        #countdown.visible { display:flex; }
        #countdown .cd-text { font-family:'Fredoka One',cursive; font-size:120px; animation:cd-pop 0.8s ease; text-shadow:0 0 60px currentColor; }
        @keyframes cd-pop { 0%{transform:scale(2);opacity:0} 30%{transform:scale(0.9);opacity:1} 50%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

        /* Cooldown bar */
        .cooldown-bar { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); width:200px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
        .cooldown-fill { height:100%; background:linear-gradient(90deg,#ffaa00,#ffdd44); transition:width 0.1s; border-radius:3px; }
        .power-hint { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:11px; opacity:0.4; font-family:'Fredoka One',cursive; letter-spacing:1px; }

        #gameArea { display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; position:relative; }
        #gameArea.visible { display:flex; }
    </style>
</head>
<body>
    <div id="menuScreen" class="screen-overlay">
        <h1>Paint Battle</h1>
        <p class="subtitle">1 vs 1</p>
        <div class="coin-display" id="menuCoins"></div>
        <button class="menu-btn" id="playBtn">LOCAL</button>
        <button class="menu-btn" id="onlineBtn">EN LIGNE</button>
        <button class="menu-btn" id="charsBtn">PERSONNAGES</button>
        <button class="menu-btn" id="gachaBtn">GACHA</button>
        <div class="menu-controls"><span>Deplacement</span> : Z Q S D / Fleches<br><span>Pouvoir</span> : ESPACE</div>
    </div>

    <div id="lobbyScreen" class="screen-overlay hidden">
        <h2>MODE EN LIGNE</h2>
        <div class="lobby-section"><h3>CREER UNE PARTIE</h3><button class="lobby-btn" id="createBtn">CREER</button><div id="createStatus"></div></div>
        <div class="lobby-section"><h3>REJOINDRE</h3><input class="lobby-input" id="codeInput" type="text" maxlength="4" placeholder="CODE"><br><button class="lobby-btn" id="joinBtn">REJOINDRE</button><div class="lobby-error" id="joinError"></div></div>
        <button class="lobby-btn" id="lobbyBackBtn">RETOUR</button>
    </div>

    <div id="charSelectScreen" class="screen-overlay hidden">
        <h2>PERSONNAGES</h2>
        <div class="coin-display" id="charCoins"></div>
        <div class="char-grid" id="charGrid"></div>
        <p id="charDesc" style="font-size:14px;opacity:0.6;margin-bottom:15px;text-align:center;max-width:400px;"></p>
        <button class="lobby-btn" id="charBackBtn" style="background:linear-gradient(135deg,#667eea,#764ba2);">RETOUR</button>
    </div>

    <div id="gachaScreen" class="screen-overlay hidden">
        <h2>GACHA</h2>
        <div class="coin-display" id="gachaCoins"></div>
        <div class="gacha-machine">
            <p class="gacha-cost">100 pieces par tirage</p>
            <div class="gacha-rates">
                <span class="rarity-common">COMMUN 60%</span> &bull;
                <span class="rarity-rare">RARE 28%</span> &bull;
                <span class="rarity-epic">EPIQUE 9%</span> &bull;
                <span class="rarity-legendary">LEGENDAIRE 3%</span>
            </div>
            <button class="menu-btn" id="pullBtn">TIRER !</button>
            <div class="gacha-result" id="gachaResult">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-name" id="resultName"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="result-dupe" id="resultDupe"></div>
            </div>
        </div>
        <button class="lobby-btn" id="gachaBackBtn" style="background:linear-gradient(135deg,#667eea,#764ba2);">RETOUR</button>
    </div>

    <div id="gameArea">
        <h1 id="title">Paint Battle</h1>
        <div id="header">
            <div class="score" id="score1">J1: 0%<span class="effect-icons" id="fx1"></span></div>
            <div id="timer">60</div>
            <div class="score" id="score2">J2: 0%<span class="effect-icons" id="fx2"></span></div>
        </div>
        <div id="bar-container"><div id="bar1" style="width:0%"></div><div id="barNeutral"></div><div id="bar2" style="width:0%"></div></div>
        <div id="game-wrapper"><canvas id="game"></canvas></div>
        <div id="controls">J1 : ZQSD + Espace &bull; J2 : Fleches + Entree</div>
        <div id="bonus-notif"></div>
    </div>

    <div id="countdown"><div class="cd-text" id="cdText"></div></div>

    <div id="endScreen">
        <h1 id="winnerText"></h1>
        <p id="finalScore"></p>
        <div class="bar-final"><div class="bf1" id="bf1"></div><div class="bf2" id="bf2"></div></div>
        <div class="coins-earned" id="coinsEarned"></div>
        <button id="restartBtn">REJOUER</button>
        <button id="menuBtn" class="menu-btn small-btn" style="background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 4px 25px rgba(102,126,234,0.4);">MENU</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    // ===== CHARACTERS =====
    const CHARACTERS = [
        { id:'blob',   name:'Blob',   icon:'\uD83D\uDFE2', rarity:'common',    color:'#66ee88', power:'Dash',         desc:'Dash rapide vers l\'avant', cooldown:4 },
        { id:'flamme', name:'Flamme', icon:'\uD83D\uDD25', rarity:'common',    color:'#ff6633', power:'Trainee de feu', desc:'Laisse une trainee de peinture enflammee', cooldown:6 },
        { id:'aqua',   name:'Aqua',   icon:'\uD83D\uDCA7', rarity:'common',    color:'#33ccff', power:'Vague',         desc:'Repousse l\'adversaire au loin', cooldown:7 },
        { id:'volt',   name:'Volt',   icon:'\u26A1',       rarity:'rare',      color:'#ffee00', power:'Eclair',        desc:'Ralentit l\'adversaire a distance', cooldown:8 },
        { id:'ombre',  name:'Ombre',  icon:'\uD83D\uDC7B', rarity:'rare',      color:'#aa88ff', power:'Invisibilite',  desc:'Devient invisible 2s', cooldown:10 },
        { id:'titan',  name:'Titan',  icon:'\uD83D\uDCAA', rarity:'rare',      color:'#ff8844', power:'Mega Stomp',    desc:'Enorme zone de peinture autour', cooldown:9 },
        { id:'crystal',name:'Crystal',icon:'\uD83D\uDC8E', rarity:'epic',      color:'#ee44ff', power:'Bouclier Miroir',desc:'Renvoie le prochain effet negatif', cooldown:12 },
        { id:'nova',   name:'Nova',   icon:'\u2B50',       rarity:'legendary', color:'#ffdd00', power:'Supernova',     desc:'Explosion massive + boost de vitesse', cooldown:15 }
    ];

    const RARITY_ORDER = { common: 0, rare: 1, epic: 2, legendary: 3 };
    const GACHA_COST = 100;
    const WIN_COINS = 50;
    const LOSE_COINS = 15;

    // ===== SAVE DATA =====
    function loadSave() {
        try {
            const d = JSON.parse(localStorage.getItem('paintbattle_save'));
            return d || { coins: 200, unlocked: ['blob'], selected: ['blob', 'blob'] };
        } catch { return { coins: 200, unlocked: ['blob'], selected: ['blob', 'blob'] }; }
    }
    function saveSave(d) { localStorage.setItem('paintbattle_save', JSON.stringify(d)); }
    let saveData = loadSave();

    function updateCoinDisplays() {
        const t = saveData.coins + ' pieces';
        const el1 = document.getElementById('menuCoins');
        const el2 = document.getElementById('charCoins');
        const el3 = document.getElementById('gachaCoins');
        if (el1) el1.textContent = t;
        if (el2) el2.textContent = t;
        if (el3) el3.textContent = t;
        const pb = document.getElementById('pullBtn');
        if (pb) pb.disabled = saveData.coins < GACHA_COST;
    }

    // ===== GACHA =====
    function gachaPull() {
        if (saveData.coins < GACHA_COST) return;
        saveData.coins -= GACHA_COST;
        const roll = Math.random() * 100;
        let rarity;
        if (roll < 60) rarity = 'common';
        else if (roll < 88) rarity = 'rare';
        else if (roll < 97) rarity = 'epic';
        else rarity = 'legendary';
        const pool = CHARACTERS.filter(c => c.rarity === rarity);
        const char = pool[Math.floor(Math.random() * pool.length)];
        const isDupe = saveData.unlocked.includes(char.id);
        if (!isDupe) saveData.unlocked.push(char.id);
        else saveData.coins += 30; // refund for dupe
        saveSave(saveData);
        updateCoinDisplays();

        const rc = { common:'#aaa', rare:'#66ccff', epic:'#cc44ff', legendary:'#ffdd00' };
        document.getElementById('resultIcon').textContent = char.icon;
        document.getElementById('resultName').textContent = char.name;
        document.getElementById('resultName').style.color = rc[char.rarity];
        document.getElementById('resultDesc').textContent = char.power + ' - ' + char.desc;
        document.getElementById('resultDupe').textContent = isDupe ? 'Doublon ! +30 pieces' : 'NOUVEAU !';
        document.getElementById('resultDupe').style.color = isDupe ? '#ff8800' : '#44ee66';
        document.getElementById('gachaResult').classList.add('show');
    }

    // ===== CHAR SELECT =====
    function buildCharGrid(forPlayer) {
        const grid = document.getElementById('charGrid');
        grid.innerHTML = '';
        CHARACTERS.forEach(c => {
            const unlocked = saveData.unlocked.includes(c.id);
            const isSelected = saveData.selected[forPlayer] === c.id;
            const card = document.createElement('div');
            card.className = 'char-card' + (isSelected ? ' selected' : '') + (!unlocked ? ' locked' : '');
            const rc = { common:'rarity-common', rare:'rarity-rare', epic:'rarity-epic', legendary:'rarity-legendary' };
            card.innerHTML = `
                <div class="char-icon">${c.icon}</div>

    // ===== OBSTACLES =====
    function generateObstacles() {
        obstacles = [];
        const count = 4 + Math.floor(Math.random() * 4);
        for (let i = 0; i < count; i++) {
            const w = 30 + Math.random() * 80;
            const h = 30 + Math.random() * 80;
            const x = 120 + Math.random() * (W - 240 - w);
            const y = 60 + Math.random() * (H - 120 - h);
            // Don't place near spawn points
            const d1 = Math.sqrt((x+w/2-60)**2 + (y+h/2-H/2)**2);
            const d2 = Math.sqrt((x+w/2-(W-60))**2 + (y+h/2-H/2)**2);
            if (d1 > 120 && d2 > 120) {
                obstacles.push({ x, y, w, h });
            }
        }
    }

    function collidesObstacle(px, py, pr) {
        for (const o of obstacles) {
            const cx = Math.max(o.x, Math.min(o.x + o.w, px));
            const cy = Math.max(o.y, Math.min(o.y + o.h, py));
            const dx = px - cx, dy = py - cy;
            if (dx*dx + dy*dy < pr*pr) return o;
        }
        return null;
    }

    function resolveObstacleCollision(p, pr) {
        for (const o of obstacles) {
            const cx = Math.max(o.x, Math.min(o.x+o.w, p.x));
            const cy = Math.max(o.y, Math.min(o.y+o.h, p.y));
            const dx = p.x-cx, dy = p.y-cy;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < pr && dist > 0) {
                const push = (pr-dist)/dist;
                p.x += dx*push;
                p.y += dy*push;
            }
        }
    }

    function spawnParticles(x,y,color,count,opts={}) {

    }

    function paintCircle(px,py,radius,playerColor) {
        const myLayer=playerColor===1?lctx1:lctx2, otherLayer=playerColor===1?lctx2:lctx1;
        // Check obstacle - don't paint inside obstacles
        const grad=myLayer.createRadialGradient(px,py,0,px,py,radius);
        grad.addColorStop(0,'rgba(255,255,255,1)'); grad.addColorStop(0.7,'rgba(255,255,255,0.95)'); grad.addColorStop(1,'rgba(255,255,255,0.6)');
        myLayer.fillStyle=grad; myLayer.beginPath(); myLayer.arc(px,py,radius,0,Math.PI*2); myLayer.fill();
        otherLayer.globalCompositeOperation='destination-out'; otherLayer.beginPath(); otherLayer.arc(px,py,radius,0,Math.PI*2); otherLayer.fillStyle='rgba(255,255,255,1)'; otherLayer.fill(); otherLayer.globalCompositeOperation='source-over';
        const minR=Math.max(0,Math.floor((py-radius)/GS)),maxR=Math.min(GR-1,Math.floor((py+radius)/GS)),minC=Math.max(0,Math.floor((px-radius)/GS)),maxC=Math.min(GC-1,Math.floor((px+radius)/GS));
        for(let r=minR;r<=maxR;r++) for(let c=minC;c<=maxC;c++) { const cx=c*GS+GS/2,cy=r*GS+GS/2,dx=cx-px,dy=cy-py; if(dx*dx+dy*dy<=radius*radius) { if(!collidesObstacle(cx,cy,1)) ownership[r][c]=playerColor; } }
    }
    function paintBomb(p) { paintCircle(p.x,p.y,80,p.color); spawnParticles(p.x,p.y,p.color===1?COLOR1:COLOR2,40,{speed:80,speedVar:100,size:3,sizeVar:6}); }
    function stealZone(p) {
        const r=70,enemy=p.color===1?2:1;
        const minR=Math.max(0,Math.floor((p.y-r)/GS)),maxR=Math.min(GR-1,Math.floor((p.y+r)/GS)),minC=Math.max(0,Math.floor((p.x-r)/GS)),maxC=Math.min(GC-1,Math.floor((p.x+r)/GS));
        for(let row=minR;row<=maxR;row++) for(let col=minC;col<=maxC;col++) { const cx=col*GS+GS/2,cy=row*GS+GS/2,dx=cx-p.x,dy=cy-p.y; if(dx*dx+dy*dy<=r*r&&ownership[row][col]===enemy) ownership[row][col]=p.color; }
        paintCircle(p.x,p.y,r,p.color); spawnParticles(p.x,p.y,'#ff8800',25);
    }

    function spawnBonus(forceData) {
        if(!forceData&&bonuses.length>=MAX_BONUSES) return;
        let bx,by,type;
        if(forceData){bx=forceData.x*W;by=forceData.y*H;type=BONUS_TYPES[forceData.typeIdx];}
        else{type=BONUS_TYPES[Math.floor(Math.random()*BONUS_TYPES.length)];bx=60+Math.random()*(W-120);by=60+Math.random()*(H-120);}
        // Don't spawn in obstacles

        bonuses.push({x:bx,y:by,type,pulse:0,spawnTime:globalTime});
        spawnParticles(bx,by,type.color,12,{speed:30,speedVar:40,life:0.6});
        if(onlineMode&&isHost&&!forceData) socket.emit('bonus-spawn',{x:bx/W,y:by/H,typeIdx:BONUS_TYPES.indexOf(type)});
    }

    // ===== CHARACTER POWERS =====
    function usePower(p) {
        if (p.cooldown > 0) return;
        const ch = p.char;
        p.cooldown = ch.cooldown;
        const opponent = players.find(o => o !== p);
        const PR = 48;

        switch(ch.id) {
            case 'blob': // Dash
                const dlen = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
                if (dlen > 0) { p.x += p.vx/dlen*120; p.y += p.vy/dlen*120; }
                else { p.x += 120; }
                p.x = Math.max(PR,Math.min(W-PR,p.x)); p.y = Math.max(PR,Math.min(H-PR,p.y));
                spawnParticles(p.x,p.y,ch.color,15,{speed:40,speedVar:30});
                showNotif(ch.icon+' DASH','#66ee88');
                break;
            case 'flamme': // Fire trail
                p.trail = 3;
                spawnParticles(p.x,p.y,'#ff6633',20,{speed:30,speedVar:40});
                showNotif(ch.icon+' FEU','#ff6633');
                break;
            case 'aqua': // Push opponent
                const wdx=opponent.x-p.x, wdy=opponent.y-p.y;
                const wdist=Math.sqrt(wdx*wdx+wdy*wdy);
                if(wdist<300&&wdist>0){opponent.x+=wdx/wdist*180;opponent.y+=wdy/wdist*180;opponent.x=Math.max(PR,Math.min(W-PR,opponent.x));opponent.y=Math.max(PR,Math.min(H-PR,opponent.y));}
                spawnParticles(p.x,p.y,'#33ccff',20,{speed:60,speedVar:40});
                showNotif(ch.icon+' VAGUE','#33ccff');
                break;
            case 'volt': // Slow opponent
                opponent.frozen = 2;
                spawnParticles(opponent.x,opponent.y,'#ffee00',25,{speed:50,speedVar:40});
                showNotif(ch.icon+' ECLAIR','#ffee00');
                break;
            case 'ombre': // Invisible
                p.invisible = 2;
                spawnParticles(p.x,p.y,'#aa88ff',15,{speed:20,speedVar:30});
                showNotif(ch.icon+' INVISIBLE','#aa88ff');
                break;
            case 'titan': // Mega stomp
                paintCircle(p.x,p.y,150,p.color);
                spawnParticles(p.x,p.y,ch.color,50,{speed:100,speedVar:80,size:3,sizeVar:5});
                showNotif(ch.icon+' STOMP','#ff8844');
                break;
            case 'crystal': // Mirror shield
                p.shield = 8;
                spawnParticles(p.x,p.y,'#ee44ff',20,{speed:30,speedVar:30});
                showNotif(ch.icon+' MIROIR','#ee44ff');
                break;
            case 'nova': // Supernova
                paintCircle(p.x,p.y,200,p.color);
                p.speedBoost = 4;
                spawnParticles(p.x,p.y,'#ffdd00',60,{speed:120,speedVar:100,size:4,sizeVar:6});
                showNotif(ch.icon+' SUPERNOVA','#ffdd00');
                break;
        }
    }

    function applyBonus(p,bonusId,bonusIdx) {
        const opponent=players.find(o=>o!==p); const PR=48,margin=PR;
        switch(bonusId){
            case 'speed':p.speedBoost=BUFF_TIME;break;case 'bomb':paintBomb(p);break;
            case 'freeze':if(opponent.shield>0){opponent.shield=0;spawnParticles(opponent.x,opponent.y,'#44ee66',15);showNotif('\uD83D\uDEE1\uFE0F BLOQUE !','#44ee66');}else opponent.frozen=BUFF_TIME;break;
            case 'steal':stealZone(p);break;case 'trail':p.trail=BUFF_TIME;break;
            case 'shrink':if(opponent.shield>0){opponent.shield=0;spawnParticles(opponent.x,opponent.y,'#44ee66',15);showNotif('\uD83D\uDEE1\uFE0F BLOQUE !','#44ee66');}else opponent.shrunk=BUFF_TIME;break;
            case 'teleport':spawnParticles(p.x,p.y,'#aa88ff',20);p.x=margin+Math.random()*(W-margin*2);p.y=margin+Math.random()*(H-margin*2);paintCircle(p.x,p.y,50,p.color);spawnParticles(p.x,p.y,'#aa88ff',20);break;
            case 'shield':p.shield=BUFF_TIME*2;break;
        }
        if(bonusIdx!==undefined&&bonusIdx>=0&&bonusIdx<bonuses.length){const b=bonuses[bonusIdx];spawnParticles(b.x,b.y,b.type.color,20,{speed:50,speedVar:70});showNotif(b.type.icon+'  '+b.type.desc,b.type.color);bonuses.splice(bonusIdx,1);}
    }

    // ===== GAME LOOP =====
    function loop() {
        const now=performance.now(); const dt=Math.min((now-lastTime)/1000,0.05); lastTime=now;
        if(!gameOver&&countdownDone) {
            globalTime+=dt; timerAcc+=dt;
            if(timerAcc>=1){timerAcc-=1;gameTime--;const el=document.getElementById('timer');el.textContent=Math.max(0,gameTime);if(gameTime<=10)el.classList.add('warning');if(gameTime<=0)endGame();}
            update(dt);
        }
        draw(); animId=requestAnimationFrame(loop);
    }

    function update(dt) {
        if(!onlineMode||isHost){bonusTimer+=dt;if(bonusTimer>=BONUS_INTERVAL){bonusTimer=0;spawnBonus();}}
        for(const b of bonuses)b.pulse+=dt*3;
        for(let i=particles.length-1;i>=0;i--){const pt=particles[i];pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vx*=0.94;pt.vy*=0.94;pt.life-=dt;if(pt.life<=0)particles.splice(i,1);}
        const PR=48;

        if(onlineMode){
            const me=players[myPlayerNum-1]; me.vx=0;me.vy=0;
            if(keys['KeyA']||keys['KeyQ']||keys['ArrowLeft'])me.vx=-1;
            if(keys['KeyD']||keys['ArrowRight'])me.vx=1;
            if(keys['KeyW']||keys['KeyZ']||keys['ArrowUp'])me.vy=-1;
            if(keys['KeyS']||keys['ArrowDown'])me.vy=1;
            if(keys['Space']){keys['Space']=false;usePower(me);}
        } else {
            const p1=players[0];p1.vx=0;p1.vy=0;
            if(keys['KeyA']||keys['KeyQ'])p1.vx=-1;if(keys['KeyD'])p1.vx=1;if(keys['KeyW']||keys['KeyZ'])p1.vy=-1;if(keys['KeyS'])p1.vy=1;
            if(keys['Space']){keys['Space']=false;usePower(p1);}
            const p2=players[1];p2.vx=0;p2.vy=0;
            if(keys['ArrowLeft'])p2.vx=-1;if(keys['ArrowRight'])p2.vx=1;if(keys['ArrowUp'])p2.vy=-1;if(keys['ArrowDown'])p2.vy=1;
            if(keys['Enter']){keys['Enter']=false;usePower(p2);}
        }

        for(const p of players){
            if(p.speedBoost>0)p.speedBoost-=dt;if(p.frozen>0)p.frozen-=dt;if(p.trail>0)p.trail-=dt;if(p.shrunk>0)p.shrunk-=dt;if(p.shield>0)p.shield-=dt;if(p.cooldown>0)p.cooldown-=dt;if(p.invisible>0)p.invisible-=dt;
            if(onlineMode&&p.color!==myPlayerNum)continue;
            const len=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(len>0){p.vx/=len;p.vy/=len;}
            let spd=SPEED;if(p.speedBoost>0)spd*=1.9;if(p.frozen>0)spd*=0.3;
            p.prevX=p.x;p.prevY=p.y;p.x+=p.vx*spd*dt;p.y+=p.vy*spd*dt;
            p.x=Math.max(PR,Math.min(W-PR,p.x));p.y=Math.max(PR,Math.min(H-PR,p.y));
            resolveObstacleCollision(p,PR);
        }

        for(const p of players){
            let radius=BRUSH;if(p.trail>0)radius=126;if(p.shrunk>0)radius=18;
            const pdx=p.x-p.prevX,pdy=p.y-p.prevY,dist=Math.sqrt(pdx*pdx+pdy*pdy);
            const steps=Math.max(1,Math.ceil(dist/(radius*0.4)));
            for(let s=0;s<=steps;s++){const t=s/steps;paintCircle(p.prevX+pdx*t,p.prevY+pdy*t,radius,p.color);}
            const len=Math.sqrt(p.vx*p.vx+p.vy*p.vy),moving=len>0;
            if(p.trail>0&&moving&&Math.random()<0.5)spawnParticles(p.x,p.y,p.color===1?COLOR1_L:COLOR2_L,1,{speed:15,speedVar:20,life:0.3,size:2,sizeVar:3});
            if(p.speedBoost>0&&moving&&Math.random()<0.4)spawnParticles(p.x-p.vx*10,p.y-p.vy*10,'#ffdd00',1,{speed:10,speedVar:15,life:0.2,size:1,sizeVar:2});
        }

        for(const p of players){
            if(onlineMode&&p.color!==myPlayerNum)continue;
            for(let i=bonuses.length-1;i>=0;i--){const b=bonuses[i];const ddx=p.x-b.x,ddy=p.y-b.y;
                if(ddx*ddx+ddy*ddy<70*70){applyBonus(p,b.type.id,i);if(onlineMode)socket.emit('bonus-pickup',{playerNum:myPlayerNum,bonusId:b.type.id,bonusIdx:i});break;}}
        }

        if(!onlineMode){
            const p1c=players[0],p2c=players[1],cdx=p2c.x-p1c.x,cdy=p2c.y-p1c.y,cdist=Math.sqrt(cdx*cdx+cdy*cdy);
            if(cdist<PR*2&&cdist>0){const ov=PR*2-cdist,nx=cdx/cdist,ny=cdy/cdist,push=ov/2+1;
                p1c.x-=nx*push;p1c.y-=ny*push;p2c.x+=nx*push;p2c.y+=ny*push;
                p1c.x=Math.max(PR,Math.min(W-PR,p1c.x));p1c.y=Math.max(PR,Math.min(H-PR,p1c.y));p2c.x=Math.max(PR,Math.min(W-PR,p2c.x));p2c.y=Math.max(PR,Math.min(H-PR,p2c.y));
                spawnParticles((p1c.x+p2c.x)/2,(p1c.y+p2c.y)/2,'#fff',6,{speed:30,speedVar:30,life:0.2,size:1,sizeVar:2});}
        }

        if(onlineMode&&socket){const me=players[myPlayerNum-1];socket.emit('pos',{x:me.x/W,y:me.y/H,vx:me.vx,vy:me.vy,speedBoost:me.speedBoost,frozen:me.frozen,trail:me.trail,shrunk:me.shrunk,shield:me.shield,invisible:me.invisible});}

        let c1=0,c2=0,total=GC*GR;
        for(let r=0;r<GR;r++)for(let c=0;c<GC;c++){if(ownership[r][c]===1)c1++;else if(ownership[r][c]===2)c2++;}
        const p1p=(c1/total)*100,p2p=(c2/total)*100;
        const fxStr=p=>{let s='';if(p.speedBoost>0)s+='\u26A1';if(p.trail>0)s+='\uD83C\uDF1F';if(p.frozen>0)s+='\u2744\uFE0F';if(p.shrunk>0)s+='\uD83D\uDD2E';if(p.shield>0)s+='\uD83D\uDEE1\uFE0F';if(p.invisible>0)s+='\uD83D\uDC7B';return s;};
        document.getElementById('score1').innerHTML=`J1: ${p1p.toFixed(1)}%<span class="effect-icons">${fxStr(players[0])}</span>`;
        document.getElementById('score2').innerHTML=`J2: ${p2p.toFixed(1)}%<span class="effect-icons">${fxStr(players[1])}</span>`;
        document.getElementById('bar1').style.width=p1p+'%';document.getElementById('bar2').style.width=p2p+'%';
    }

    function draw() {
        ctx.drawImage(bgCanvas,0,0);

        // Obstacles
        for (const o of (obstacles||[])) {
            // Outer glow
            ctx.save();
            ctx.shadowColor = 'rgba(160,120,255,0.5)'; ctx.shadowBlur = 18;
            const g = ctx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);
            g.addColorStop(0,'#4a3a7a'); g.addColorStop(1,'#3a2a6a');
            ctx.fillStyle = g; ctx.beginPath();
            ctx.roundRect(o.x,o.y,o.w,o.h,8); ctx.fill();
            ctx.restore();
            ctx.strokeStyle = 'rgba(200,170,255,0.6)'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,8); ctx.stroke();
            // Inner highlight
            ctx.fillStyle = 'rgba(200,170,255,0.08)';
            ctx.beginPath(); ctx.roundRect(o.x+3,o.y+3,o.w-6,o.h-6,6); ctx.fill();
        }

        ctx.save();ctx.globalAlpha=0.85;ctx.drawImage(layer1,0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle=COLOR1_L;ctx.fillRect(0,0,W,H);ctx.restore();
        ctx.drawImage(bgCanvas,0,0);
        // Redraw obstacles on top of bg
        for(const o of(obstacles||[])){ctx.save();ctx.shadowColor='rgba(160,120,255,0.5)';ctx.shadowBlur=18;const g=ctx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);g.addColorStop(0,'#4a3a7a');g.addColorStop(1,'#3a2a6a');ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,8);ctx.fill();ctx.restore();ctx.strokeStyle='rgba(200,170,255,0.6)';ctx.lineWidth=2.5;ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,8);ctx.stroke();}
        ctx.save();ctx.globalCompositeOperation='source-over';
        drawColoredLayer(lctx1,layer1,['#ff8fa3','#ff7088','#ffa0b3'],1);
        drawColoredLayer(lctx2,layer2,['#7dd3ff','#68c4f0','#92dfff'],2);
        ctx.restore();

        for(const pt of particles){const a=Math.min(1,pt.life*2.5);ctx.globalAlpha=a;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size*(0.5+a*0.5),0,Math.PI*2);ctx.fill();}
        ctx.globalAlpha=1;

        // Bonuses
        for(const b of bonuses){const ps=1+Math.sin(b.pulse)*0.12,r=40*ps,fy=Math.sin(b.pulse*0.7)*4,age=globalTime-b.spawnTime,sc=Math.min(1,age*4);
            ctx.save();ctx.translate(b.x,b.y+fy);ctx.scale(sc,sc);
            ctx.globalAlpha=0.15+Math.sin(b.pulse*1.5)*0.08;ctx.strokeStyle=b.type.color;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,r+12,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
            const gg=ctx.createRadialGradient(0,0,0,0,0,r+18);gg.addColorStop(0,b.type.glow+'55');gg.addColorStop(0.6,b.type.glow+'18');gg.addColorStop(1,b.type.glow+'00');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(0,0,r+18,0,Math.PI*2);ctx.fill();
            const cg=ctx.createRadialGradient(-r*0.25,-r*0.25,0,0,0,r);cg.addColorStop(0,b.type.glow);cg.addColorStop(0.7,b.type.color);cg.addColorStop(1,b.type.color+'cc');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.ellipse(-r*0.15,-r*0.3,r*0.5,r*0.25,-0.3,0,Math.PI*2);ctx.fill();
            ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
            ctx.font=`${Math.round(r*1.1)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.type.icon,0,2);ctx.restore();}

        // Players
        for(const p of players){
            if(p.invisible>0&&(onlineMode?p.color!==myPlayerNum:false))continue; // hide invisible opponent
            const isP1=p.color===1,colL=isP1?'#ff7a93':'#66ccff',colD=isP1?COLOR1_D:COLOR2_D,PR=48;
            ctx.save();
            if(p.invisible>0)ctx.globalAlpha=p.color===myPlayerNum?0.3:0.15;
            const dx=p.x-(p.prevX||p.x),dy=p.y-(p.prevY||p.y),ms=Math.sqrt(dx*dx+dy*dy);
            const stretch=1+Math.min(ms*0.01,0.15),squash=1/stretch,ma=ms>0.5?Math.atan2(dy,dx):0;
            ctx.translate(p.x,p.y);if(ms>0.5){ctx.rotate(ma);ctx.scale(stretch,squash);ctx.rotate(-ma);}
            if(p.speedBoost>0){ctx.strokeStyle='rgba(255,221,0,0.5)';ctx.lineWidth=3;ctx.setLineDash([6,4]);ctx.lineDashOffset=globalTime*40;ctx.beginPath();ctx.arc(0,0,PR+10,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.lineDashOffset=0;}
            if(p.trail>0){ctx.fillStyle='rgba(255,170,0,0.12)';ctx.beginPath();ctx.arc(0,0,42,0,Math.PI*2);ctx.fill();}
            if(p.shield>0){ctx.strokeStyle='rgba(68,238,102,0.6)';ctx.lineWidth=3;ctx.setLineDash([8,4]);ctx.lineDashOffset=-globalTime*20;ctx.beginPath();ctx.arc(0,0,PR+8,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.lineDashOffset=0;}
            if(p.frozen>0){const fg=ctx.createRadialGradient(0,0,PR*0.5,0,0,PR+14);fg.addColorStop(0,'rgba(0,238,255,0)');fg.addColorStop(0.7,'rgba(0,238,255,0.15)');fg.addColorStop(1,'rgba(0,238,255,0.35)');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(0,0,PR+14,0,Math.PI*2);ctx.fill();}
            ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(3,5,PR*0.9,PR*0.5,0,0,Math.PI*2);ctx.fill();
            const bg=ctx.createRadialGradient(-PR*0.25,-PR*0.25,0,0,0,PR);if(p.frozen>0){bg.addColorStop(0,'#b8ddf0');bg.addColorStop(1,'#5a99bb');}else{bg.addColorStop(0,colL);bg.addColorStop(1,colD);}
            ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.ellipse(-PR*0.2,-PR*0.35,PR*0.45,PR*0.2,-0.4,0,Math.PI*2);ctx.fill();
            ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,PR,0,Math.PI*2);ctx.stroke();
            const ex=(p.vx>0?6:p.vx<0?-6:0),ey=(p.vy>0?4.5:p.vy<0?-4.5:0);
            ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-15,-6,13.5,16.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(15,-6,13.5,16.5,0,0,Math.PI*2);ctx.fill();
            ctx.fillStyle=isP1?'#881133':'#113366';ctx.beginPath();ctx.arc(-12+ex,-4.5+ey,9,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(18+ex,-4.5+ey,9,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-12+ex,-4.5+ey,5.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(18+ex,-4.5+ey,5.4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(-16.5+ex*0.3,-10.5,4.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(13.5+ex*0.3,-10.5,4.5,0,Math.PI*2);ctx.fill();
            if(p.frozen>0){ctx.strokeStyle='#445566';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-9,15);ctx.quadraticCurveTo(-3,12,0,15);ctx.quadraticCurveTo(3,18,9,15);ctx.stroke();}
            else if(ms>2){ctx.strokeStyle=colD;ctx.lineWidth=4;ctx.beginPath();ctx.arc(1.5,9,9,0.2,Math.PI-0.2);ctx.stroke();}
            else{ctx.fillStyle=colD;ctx.beginPath();ctx.ellipse(1.5,13.5,6,3.6,0,0,Math.PI*2);ctx.fill();}
            // Character icon above
            ctx.font='bold 20px Nunito,Arial';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.7)';
            ctx.fillText(p.char.icon,0,-PR-8);
            // Cooldown arc
            if(p.cooldown>0){const pct=p.cooldown/p.char.cooldown;ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,PR+12,8,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-pct));ctx.stroke();ctx.strokeStyle='#ffdd00';ctx.beginPath();ctx.arc(0,PR+12,8,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-pct));ctx.stroke();}
            else{ctx.fillStyle='rgba(255,221,0,0.6)';ctx.font='10px Fredoka One';ctx.fillText('PRET',0,PR+16);}
            ctx.restore();
        }

        const vig=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.2)');ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
    }

    function drawColoredLayer(lc,lv,colors,pn){tintCtx.clearRect(0,0,W,H);tintCtx.globalCompositeOperation='source-over';tintCtx.drawImage(lv,0,0);tintCtx.globalCompositeOperation='source-in';const g=tintCtx.createLinearGradient(0,0,W,H);g.addColorStop(0,colors[0]);g.addColorStop(0.5,colors[1]);g.addColorStop(1,colors[2]);tintCtx.fillStyle=g;tintCtx.fillRect(0,0,W,H);tintCtx.globalCompositeOperation='source-over';ctx.drawImage(tintCanvas,0,0);}

    function endGame() {
        gameOver=true;
        let c1=0,c2=0,total=GC*GR;
        for(let r=0;r<GR;r++)for(let c=0;c<GC;c++){if(ownership[r][c]===1)c1++;else if(ownership[r][c]===2)c2++;}
        const p1=(c1/total)*100,p2=(c2/total)*100;
        let winner,wc,earned=LOSE_COINS;
        if(onlineMode){
            if(c1>c2){winner=myPlayerNum===1?'VICTOIRE !':'DEFAITE...';wc=COLOR1;if(myPlayerNum===1)earned=WIN_COINS;}
            else if(c2>c1){winner=myPlayerNum===2?'VICTOIRE !':'DEFAITE...';wc=COLOR2;if(myPlayerNum===2)earned=WIN_COINS;}
            else{winner='EGALITE !';wc='#fff';earned=25;}
        } else {
            if(c1>c2){winner='JOUEUR 1 GAGNE !';wc=COLOR1;}
            else if(c2>c1){winner='JOUEUR 2 GAGNE !';wc=COLOR2;}
            else{winner='EGALITE !';wc='#fff';}
            earned=WIN_COINS;
        }
        saveData.coins+=earned; saveSave(saveData); updateCoinDisplays();
        document.getElementById('winnerText').textContent=winner;document.getElementById('winnerText').style.color=wc;
        document.getElementById('finalScore').textContent=`Rouge: ${p1.toFixed(1)}%  \u2014  Bleu: ${p2.toFixed(1)}%`;
        document.getElementById('coinsEarned').textContent='+'+earned+' pieces';
        document.getElementById('bf1').style.width=p1+'%';document.getElementById('bf2').style.width=p2+'%';
        document.getElementById('endScreen').classList.add('visible');
        document.getElementById('restartBtn').style.display=onlineMode?'none':'';
    }

    // ===== INPUT =====
    document.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();});
    document.addEventListener('keyup',e=>{keys[e.code]=false;});

    // ===== NAVIGATION =====
    function hideAll(){['menuScreen','lobbyScreen','charSelectScreen','gachaScreen'].forEach(id=>{document.getElementById(id).classList.add('hidden');});document.getElementById('gameArea').classList.remove('visible');document.getElementById('endScreen').classList.remove('visible');}
    function showScreen(id){hideAll();document.getElementById(id).classList.remove('hidden');}

    document.getElementById('playBtn').addEventListener('click',()=>{onlineMode=false;hideAll();document.getElementById('gameArea').classList.add('visible');init();});
    document.getElementById('onlineBtn').addEventListener('click',()=>{showScreen('lobbyScreen');connectSocket();});
    document.getElementById('charsBtn').addEventListener('click',()=>{showScreen('charSelectScreen');charSelectPlayer=0;buildCharGrid(0);document.getElementById('charDesc').textContent='Selectionnez un personnage pour J1 (cliquez deux fois pour J2)';});
    document.getElementById('gachaBtn').addEventListener('click',()=>{showScreen('gachaScreen');document.getElementById('gachaResult').classList.remove('show');updateCoinDisplays();});
    document.getElementById('charBackBtn').addEventListener('click',()=>{if(charSelectPlayer===0){charSelectPlayer=1;buildCharGrid(1);document.getElementById('charDesc').textContent='Selectionnez un personnage pour J2';}else showScreen('menuScreen');});
    document.getElementById('gachaBackBtn').addEventListener('click',()=>showScreen('menuScreen'));
    document.getElementById('lobbyBackBtn').addEventListener('click',()=>{if(socket){socket.disconnect();socket=null;}showScreen('menuScreen');});
    document.getElementById('menuBtn').addEventListener('click',()=>{if(animId)cancelAnimationFrame(animId);animId=null;onlineMode=false;if(socket){socket.disconnect();socket=null;}showScreen('menuScreen');updateCoinDisplays();});
    document.getElementById('restartBtn').addEventListener('click',init);
    document.getElementById('pullBtn').addEventListener('click',gachaPull);
    document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('joinBtn').click();});

    // ===== ONLINE =====
    function connectSocket(){
        if(socket)return;socket=io(window.location.origin);
        socket.on('room-created',code=>{myPlayerNum=1;isHost=true;document.getElementById('createStatus').innerHTML=`<div class="room-code">${code}</div><p class="lobby-status waiting">En attente d'un adversaire</p>`;});
        socket.on('room-joined',()=>{myPlayerNum=2;isHost=false;});
        socket.on('join-error',msg=>document.getElementById('joinError').textContent=msg);
        socket.on('game-start',(data)=>{onlineMode=true;hideAll();document.getElementById('gameArea').classList.add('visible');init();if(data&&data.obstacles){obstacles=data.obstacles;}});
        socket.on('sync-obstacles',(data)=>{if(data&&data.obstacles){obstacles=data.obstacles;}});
        socket.on('pos',data=>{if(!players)return;const other=players[myPlayerNum===1?1:0];other.prevX=other.x;other.prevY=other.y;other.x=data.x*W;other.y=data.y*H;other.vx=data.vx;other.vy=data.vy;other.speedBoost=data.speedBoost;other.frozen=data.frozen;other.trail=data.trail;other.shrunk=data.shrunk;other.shield=data.shield;other.invisible=data.invisible||0;});
        socket.on('bonus-spawn',data=>spawnBonus(data));
        socket.on('bonus-pickup',data=>{if(!players)return;applyBonus(players[data.playerNum-1],data.bonusId,data.bonusIdx);});
        socket.on('opponent-left',()=>{showNotif('Adversaire deconnecte','#ff5555');setTimeout(()=>{if(animId)cancelAnimationFrame(animId);animId=null;showScreen('menuScreen');},2000);});
    }
    document.getElementById('createBtn').addEventListener('click',()=>{if(socket)socket.emit('create-room');});
    document.getElementById('joinBtn').addEventListener('click',()=>{const code=document.getElementById('codeInput').value.trim().toUpperCase();if(code.length!==4){document.getElementById('joinError').textContent='Code a 4 caracteres requis';return;}document.getElementById('joinError').textContent='';if(socket)socket.emit('join-room',code);});

    updateCoinDisplays();
    </script>
</body>
